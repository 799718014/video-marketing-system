[pytest]
# Pytest 配置文件

# 测试文件匹配模式
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 测试路径
testpaths = tests

# 输出选项
addopts =
    -v
    --tb=short
    --strict-markers
    --cov=services/batch_video_service
    --cov=utils/video_merge
    --cov=routers/batch_video
    --cov-report=html
    --cov-report=term-missing

# 标记定义
markers =
    slow: 标记慢速测试
    integration: 标记集成测试
    unit: 标记单元测试
    api: 标记API测试

# 最小Python版本
minversion = 7.0