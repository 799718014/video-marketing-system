# Nginx 站点配置：商品宣传视频生成系统
# 复制到 /etc/nginx/sites-available/video-marketing 并软链到 sites-enabled
# 记得把 server_name 改为你的域名或服务器 IP

server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com;   # 改成你的域名或公网 IP

    # 前端静态文件（Vite 构建产物）
    root /opt/video-marketing-system/frontend/dist;
    index index.html;

    # 前端为单页应用，未匹配到文件时回退到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 后端 API 反向代理
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 视频生成为长耗时任务，适当调大超时
        proxy_connect_timeout 60s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # 关闭缓冲，便于视频流式下载
        proxy_buffering off;
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }
}
